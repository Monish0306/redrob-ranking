# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) for architecture design, code generation, and
  debugging assistance throughout development. All design decisions
  (scoring methodology, honeypot detection rules, weight calibration)
  were reviewed and validated against the actual dataset before being
  finalized. No candidate data was ever sent to any hosted LLM API —
  Claude was used only during the development/coding process, never
  inside the ranking pipeline itself. The ranking pipeline (src/rank.py)
  contains zero hosted-LLM API calls; semantic similarity uses a locally
  cached sentence-transformers model running entirely offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A rule-engineered, multi-signal ranking pipeline (not a trained ML/DL
  model, since no labels exist for the 100K pool). Pipeline: (1) schema
  validation + streaming ingestion, (2) rule-based honeypot pre-filter
  using date-arithmetic and evidence-consistency checks — excludes 65
  candidates matching the organizer's stated honeypot patterns, (3) six
  deterministic feature dimensions (title/role coherence gate, evidence-
  weighted skill scoring, experience band, company type, location, plus
  trajectory/recency/GitHub enhancements), (4) semantic similarity via a
  locally-run sentence-transformers model (all-MiniLM-L6-v2) comparing
  the JD against pre-computed candidate embeddings, (5) composite scoring
  combining all signals with a multiplicative behavioral-availability
  discount (never additive, per the JD's stated "down-weight, don't
  exclude" guidance), (6) deterministic template-based reasoning
  generation reading directly from each candidate's own computed
  sub-scores — zero generative model calls anywhere in the ranking path.
  Title/role gating exists specifically to defeat the keyword-stuffing
  trap the JD names explicitly. Ranking step completes in under 1 minute
  on CPU; embedding pre-computation is a separate, explicitly offline
  step per the spec's own allowance.

